name: Keepalive Ping

# Every 3 minutes, hit the SnapDeploy URL from GitHub's servers.
# This counts as "external traffic" for SnapDeploy's free plan
# (which auto-sleeps after 15 minutes of no incoming requests),
# so the container stays awake and the nezha agent stays online.
#
# Total free minutes per month on GitHub Actions (public repo): unlimited
# Total free minutes per month on GitHub Actions (private repo): 2000
# This workflow uses ~480 runs/month * ~10 seconds = ~80 minutes. Safe.
#
# To change the target URL, edit KEEPALIVE_URL below or set the
# KEEPALIVE_URL repository variable in Settings -> Secrets and variables ->
# Actions -> Variables.

on:
  schedule:
    # Every 3 minutes. GitHub Actions cron is "best effort" - actual runs
    # may be delayed by a few minutes during peak hours, but never skipped
    # entirely. Worst case observed delay: 5-10 minutes, still well under
    # SnapDeploy's 15-minute sleep threshold.
    - cron: '*/3 * * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping keepalive URL
        env:
          # Default to the SnapDeploy URL. Override via repository variable
          # named KEEPALIVE_URL if you need a different target.
          KEEPALIVE_URL: ${{ vars.KEEPALIVE_URL || 'https://vip012.containers.snapdeploy.dev/start-nz' }}
        run: |
          echo "Pinging $KEEPALIVE_URL at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          # Try up to 3 times in case the container is cold-starting
          # (SnapDeploy takes ~60s to wake a sleeping container)
          for attempt in 1 2 3; do
            echo "--- Attempt $attempt ---"
            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
              --max-time 90 \
              --connect-timeout 30 \
              "$KEEPALIVE_URL" || echo "000")
            echo "HTTP code: $HTTP_CODE"
            echo "Response body:"
            cat /tmp/resp.txt 2>/dev/null | head -c 500
            echo ""
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Ping succeeded"
              exit 0
            fi
            echo "Attempt $attempt failed (HTTP $HTTP_CODE), waiting 20s before retry..."
            sleep 20
          done
          echo "All attempts failed - container may be down. Will retry next run."
          # Don't fail the workflow - we don't want GitHub to disable the schedule
          exit 0
