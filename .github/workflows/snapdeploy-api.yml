name: SnapDeploy Keepalive (public wake API + URL ping)

# Discovery: SnapDeploy has a PUBLIC wake API that doesn't require login!
# When the container is sleeping, hitting its URL returns a 503 page that
# contains a wake button. That button calls:
#   POST https://snapdeploy.dev/api/public/wake/{subdomain}
# This API returns 200 immediately and starts the container in the background.
# No Cloudflare Turnstile, no auth, no cookies needed.
#
# Flow (every 10 minutes):
#   1. Check if container is awake by pinging its public URL
#   2. If awake (HTTP 200): just ping /start-nz to keep agent alive
#   3. If asleep (HTTP 503): call public wake API, then wait + retry
#   4. Final ping to /start-nz as fallback
#
# NOTE: This workflow is also callable via repository_dispatch event with
# event_type "keepalive-snap". This is used as a backup trigger in case
# GitHub Actions schedule doesn't fire (known issue for new public repos).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [keepalive-snap]

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake + ping
        env:
          # Default values - override via repository variables/secrets if needed
          CONTAINER_URL: ${{ vars.KEEPALIVE_URL || 'https://vip012.containers.snapdeploy.dev/start-nz' }}
          # Extract subdomain from URL: https://vip012.containers.snapdeploy.dev/... -> vip012
          SUBDOMAIN: ${{ vars.SNAPDEPLOY_SUBDOMAIN || 'vip012' }}
        run: |
          set +e  # never fail the workflow
          echo "=== SnapDeploy Keepalive at $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          echo "Container URL: $CONTAINER_URL"
          echo "Subdomain:     $SUBDOMAIN"
          echo ""

          # ===== Step 1: Check current container status =====
          echo "=== Step 1: Check container status ==="
          HTTP_CODE=$(curl -s -o /tmp/check.html -w "%{http_code}" \
            --max-time 10 --connect-timeout 5 \
            "$CONTAINER_URL" || echo "000")
          echo "Ping HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Container is awake"
            cat /tmp/check.html | head -c 200
            echo ""
            # Still hit /start-nz to ensure agent is running
            echo "Hitting /start-nz for agent keep-alive..."
            curl -s --max-time 30 "$CONTAINER_URL" -o /dev/null -w "  /start-nz HTTP: %{http_code}\n"
            exit 0
          fi

          # ===== Step 2: Container is asleep (503) or unreachable, wake it =====
          echo ""
          echo "=== Step 2: Container not responding (HTTP $HTTP_CODE), waking up ==="
          WAKE_HTTP=$(curl -s -o /tmp/wake.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            --max-time 15 \
            "https://snapdeploy.dev/api/public/wake/$SUBDOMAIN" || echo "000")
          echo "Wake API HTTP: $WAKE_HTTP"
          echo "Wake response:"
          cat /tmp/wake.json 2>/dev/null | head -c 500
          echo ""

          if [ "$WAKE_HTTP" != "200" ]; then
            echo "::warning::Wake API failed (HTTP $WAKE_HTTP). Will retry URL ping."
          fi

          # ===== Step 3: Wait for container to come up (60-90s) =====
          echo ""
          echo "=== Step 3: Waiting for container to start (up to 120s) ==="
          for attempt in 1 2 3 4 5 6 7 8; do
            sleep 15
            elapsed=$((attempt * 15))
            echo "--- Check $attempt at ${elapsed}s ---"
            HTTP_CODE=$(curl -s -o /tmp/recheck.html -w "%{http_code}" \
              --max-time 15 --connect-timeout 5 \
              "$CONTAINER_URL" || echo "000")
            echo "HTTP: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Container is awake!"
              cat /tmp/recheck.html | head -c 200
              echo ""
              # Hit /start-nz to ensure agent is running
              echo "Hitting /start-nz for agent start..."
              curl -s --max-time 30 "$CONTAINER_URL" -o /dev/null -w "  /start-nz HTTP: %{http_code}\n"
              exit 0
            fi
          done

          echo "::warning::Container did not come up within 120s. Will retry next run."
          exit 0

