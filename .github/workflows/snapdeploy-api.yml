name: SnapDeploy Keepalive (browser login + API + ping)

# Full browser-based login to bypass Cloudflare Turnstile.
# GitHub Actions runs on a full Ubuntu VM with Chromium available,
# so we can execute JS challenges just like a real browser.
#
# Flow:
#   1. Launch headless Chromium with persistent context
#   2. Navigate to https://snapdeploy.dev/login
#   3. Wait for Turnstile widget to auto-solve (or click it if needed)
#   4. Fill email + password, click "Login"
#   5. Wait for redirect to /containers (login success)
#   6. Extract JSESSIONID + XSRF-TOKEN cookies
#   7. GET /web/api/containers/{id} to check status
#   8. If not running, POST /web/api/containers/{id}/start
#   9. Always ping public URL /start-nz as core keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y > /dev/null
          npm install playwright --silent
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Browser login + check status + start if needed + ping
        env:
          EMAIL: ${{ secrets.SNAPDEPLOY_EMAIL }}
          PASSWORD: ${{ secrets.SNAPDEPLOY_PASSWORD }}
          CONTAINER_ID: ${{ secrets.SNAPDEPLOY_CONTAINER_ID }}
          KEEPALIVE_URL: ${{ vars.KEEPALIVE_URL || 'https://vip012.containers.snapdeploy.dev/start-nz' }}
        run: |
          set +e
          if [ -z "$EMAIL" ] || [ -z "$PASSWORD" ] || [ -z "$CONTAINER_ID" ]; then
            echo "::warning::Missing secrets (SNAPDEPLOY_EMAIL/PASSWORD/CONTAINER_ID). Skipping browser login."
          else
            node .github/scripts/snapdeploy-login.js
          fi
          echo ""
          echo "=== Core keepalive: URL ping ==="
          for attempt in 1 2 3; do
            echo "--- Attempt $attempt ---"
            HTTP_CODE=$(curl -s -o /tmp/url-resp.txt -w "%{http_code}" \
              --max-time 90 --connect-timeout 30 \
              "$KEEPALIVE_URL" || echo "000")
            echo "HTTP: $HTTP_CODE"
            echo "Response: $(cat /tmp/url-resp.txt 2>/dev/null | head -c 300)"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ URL ping succeeded"
              break
            fi
            sleep 20
          done
          exit 0
